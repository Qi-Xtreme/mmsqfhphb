<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>💰 猫猫山群富豪排行榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 720px;
            width: 100%;
            background: rgba(22, 28, 46, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem 1.8rem 2.2rem;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 100, 0.15);
            border: 1px solid rgba(255, 215, 100, 0.08);
            transition: all 0.2s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid rgba(255, 215, 100, 0.2);
            padding-bottom: 0.8rem;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .title-group h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f9e05d, #f5b041);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(245, 176, 65, 0.25);
        }

        .crown {
            font-size: 2rem;
            line-height: 1;
            filter: drop-shadow(0 4px 6px rgba(255, 215, 0, 0.3));
        }

        .clock {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.4rem 1rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 100, 0.2);
            color: #e0e8f5;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clock i {
            font-style: normal;
            font-size: 1.1rem;
        }

        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.4rem;
        }

        .rank-item {
            display: flex;
            align-items: center;
            background: rgba(12, 17, 29, 0.6);
            border-radius: 60px;
            padding: 0.6rem 0.9rem 0.6rem 1.2rem;
            border: 1px solid rgba(255, 215, 100, 0.08);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            backdrop-filter: blur(2px);
        }

        .rank-item:hover {
            background: rgba(30, 40, 65, 0.8);
            border-color: rgba(255, 215, 100, 0.25);
            transform: scale(1.01);
            box-shadow: 0 8px 18px -6px #00000066;
        }

        .rank-number {
            width: 2.4rem;
            font-weight: 700;
            font-size: 1.3rem;
            color: #a0b3d9;
            letter-spacing: -0.5px;
            text-align: left;
            flex-shrink: 0;
        }

        .rank-1 .rank-number {
            color: #ffd966;
            text-shadow: 0 0 12px #f5b04180;
        }
        .rank-2 .rank-number {
            color: #c0cbd8;
            text-shadow: 0 0 8px #b0bccd80;
        }
        .rank-3 .rank-number {
            color: #cd9f6e;
            text-shadow: 0 0 8px #b8863b60;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 42px;
            background: linear-gradient(135deg, #2d3855, #1d253f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 600;
            color: #ebf0fa;
            margin-right: 0.9rem;
            flex-shrink: 0;
            border: 2px solid rgba(255, 215, 100, 0.15);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
        }

        .rank-1 .avatar {
            border-color: #ffd966;
            box-shadow: 0 0 16px #f5b04160;
        }
        .rank-2 .avatar {
            border-color: #b0bccd;
        }
        .rank-3 .avatar {
            border-color: #cd9f6e;
        }

        .info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.3rem 0.8rem;
        }

        .name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f4fe;
            letter-spacing: -0.2px;
            word-break: break-word;
        }

        .wealth {
            background: rgba(0, 0, 0, 0.25);
            padding: 0.2rem 1rem 0.2rem 1rem;
            border-radius: 60px;
            font-size: 1.15rem;
            font-weight: 600;
            color: #b9e6b0;
            border: 1px solid rgba(100, 200, 100, 0.15);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .wealth::before {
            content: "🪙";
            font-size: 1rem;
            filter: drop-shadow(0 2px 4px #f5b04140);
            margin-right: 4px;
        }

        .footer-note {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #6b7ba3;
            text-align: center;
            border-top: 1px solid rgba(255, 215, 100, 0.06);
            padding-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            letter-spacing: 0.2px;
        }

        .footer-note span {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.2rem 0.9rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .badge {
            font-size: 0.7rem;
            background: #2d3855;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            color: #8da1cb;
            margin-left: 0.2rem;
        }

        /* 空状态 / 加载 */
        .loading-placeholder {
            text-align: center;
            padding: 2rem 0;
            color: #8895bb;
        }

        .error-message {
            background: #3f1e2e;
            border: 1px solid #b44a5e;
            color: #ffb3b3;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            text-align: center;
            margin: 1rem 0;
        }

        @media (max-width: 500px) {
            .card { padding: 1.2rem; }
            .title-group h1 { font-size: 1.5rem; }
            .clock { font-size: 1rem; padding: 0.3rem 0.8rem; }
            .rank-item { padding: 0.4rem 0.6rem 0.4rem 0.9rem; }
            .avatar { width: 36px; height: 36px; font-size: 1.1rem; margin-right: 0.6rem; }
            .name { font-size: 1rem; }
            .wealth { font-size: 0.95rem; padding: 0.1rem 0.7rem; }
            .rank-number { width: 1.8rem; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="card" id="app">
    <div class="header">
        <div class="title-group">
            <span class="crown">👑</span>
            <h1>富豪榜</h1>
        </div>
        <div class="clock" id="liveClock">
            <i>🕒</i> <span id="clockDisplay">--:--:--</span>
        </div>
    </div>

    <!-- 排行榜容器 -->
    <div id="leaderboardContainer" class="leaderboard">
        <!-- 由 JavaScript 动态渲染 -->
        <div class="loading-placeholder">⏳ 加载数据中 ...</div>
    </div>

    <!-- <div class="footer-note">
        <span>📁 data.json</span>
        <span>🔄 更新 JSON 即刷新</span>
        <span>👥 8 位富豪</span>
    </div> -->
</div>

<script>
    (function() {
        "use strict";

        // ----- DOM 引用 -----
        const leaderboardEl = document.getElementById('leaderboardContainer');
        const clockDisplay = document.getElementById('clockDisplay');

        // ----- 工具: 格式化数字 (千位分隔) -----
        function formatWealth(value) {
            if (value === undefined || value === null) return '0';
            const num = Number(value);
            if (isNaN(num)) return '0';
            // 保留整数，加千位分隔
            return num.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
        }

        // ----- 渲染排行榜 (纯函数) -----
        function renderLeaderboard(users) {
            if (!users || !Array.isArray(users) || users.length === 0) {
                leaderboardEl.innerHTML = `
                    <div class="error-message" style="background:#2a223a; border-color:#7a5a7a; color:#d4b8d4;">
                        ⚠️ 暂无数据，请检查 data.json
                    </div>
                `;
                return;
            }

            // 按 wealth 降序排序 (从高到低)
            const sorted = [...users].sort((a, b) => (b.wealth || 0) - (a.wealth || 0));

            // 取前8 (若多余8则只显示前8, 但设计为8人)
            const topList = sorted.slice(0, 8);

            // 生成 html
            let html = '';
            topList.forEach((user, index) => {
                const rank = index + 1;
                const rankClass = rank <= 3 ? `rank-${rank}` : '';
                const avatarText = (user.name && user.name.length > 0) ? user.name.charAt(0).toUpperCase() : '?';
                const displayName = user.name || '无名氏';
                const wealthValue = (user.wealth !== undefined && user.wealth !== null) ? user.wealth : 0;
                const formattedWealth = formatWealth(wealthValue);

                html += `
                    <div class="rank-item ${rankClass}">
                        <div class="rank-number">#${rank}</div>
                        <div class="avatar">${avatarText}</div>
                        <div class="info">
                            <span class="name">${displayName}</span>
                            <span class="wealth">${formattedWealth}</span>
                        </div>
                    </div>
                `;
            });

            // 如果不足8人, 补全空位 (但设计上json有8人)
            if (topList.length < 8) {
                for (let i = topList.length; i < 8; i++) {
                    const rank = i + 1;
                    html += `
                        <div class="rank-item" style="opacity:0.5; filter:grayscale(0.6);">
                            <div class="rank-number">#${rank}</div>
                            <div class="avatar" style="background:#1f263b;">?</div>
                            <div class="info">
                                <span class="name" style="color:#6b7b9f;">空位</span>
                                <span class="wealth" style="color:#5a6a7a;">-</span>
                            </div>
                        </div>
                    `;
                }
            }

            leaderboardEl.innerHTML = html;
        }

        // ----- 加载 JSON 数据 (fetch) -----
        function loadData() {
            // 直接请求同目录下的 data.json (相对路径)
            fetch('data.json', {
                cache: 'no-cache', // 避免缓存导致不更新
                headers: {
                    'Content-Type': 'application/json',
                    'Cache-Control': 'no-cache'
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // 兼容多种格式: 如果 data 是数组直接使用; 如果 data.users 是数组则使用 users
                let users = null;
                if (Array.isArray(data)) {
                    users = data;
                } else if (data && Array.isArray(data.users)) {
                    users = data.users;
                } else if (data && typeof data === 'object') {
                    // 尝试取第一个数组属性 (兜底)
                    const keys = Object.keys(data);
                    for (let key of keys) {
                        if (Array.isArray(data[key])) {
                            users = data[key];
                            break;
                        }
                    }
                }

                if (!users || !Array.isArray(users) || users.length === 0) {
                    // 若没有有效数组，显示错误
                    leaderboardEl.innerHTML = `
                        <div class="error-message" style="background:#2a223a; border-color:#7a5a7a; color:#d4b8d4;">
                            ⚠️ data.json 格式无效，请确保为数组或包含 users 数组
                        </div>
                    `;
                    return;
                }

                // 确保每个元素有 name 和 wealth
                const sanitized = users.map(item => ({
                    name: (item.name && typeof item.name === 'string') ? item.name.trim() : '未知',
                    wealth: (typeof item.wealth === 'number' && !isNaN(item.wealth)) ? item.wealth : 0
                }));

                renderLeaderboard(sanitized);
            })
            .catch(error => {
                console.warn('加载 data.json 失败:', error);
                leaderboardEl.innerHTML = `
                    <div class="error-message">
                        ❌ 无法读取 data.json <br> 
                        <span style="font-size:0.8rem; opacity:0.7;">${error.message || '请确保文件存在且格式正确'}</span>
                    </div>
                `;
            });
        }

        // ----- 实时时钟 (每秒更新) -----
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockDisplay.textContent = `${hours}:${minutes}:${seconds}`;
        }

        // ----- 初始化: 加载数据 + 时钟 + 定时刷新 (每10秒重新拉取json) -----
        function init() {
            // 首次加载
            loadData();
            updateClock();

            // 时钟每秒更新
            setInterval(updateClock, 1000);

            // 每10秒检查一次 json 更新 (可自由调整)
            setInterval(() => {
                loadData();
            }, 10000); // 10秒轮询, 保证修改json后自动刷新

            // 可选: 页面可见性变化时立即刷新 (用户切回页面时)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    loadData();
                }
            });
        }

        // 启动
        init();
    })();
</script>
</body>
</html>
